# Bybit 스팟 티커 → Supabase `dopamine_crypto_feed_cache` (Vercel은 읽기만).
# Secrets: repo 또는 Environment `production` — NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_KEY
name: Crypto feed cache (Bybit → Supabase)

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          # 저장소 루트 = 이 server 레포 루트 (상위 DopamineAssets/server 가 아님)
          cache-dependency-path: package-lock.json
      - name: Install & refresh cache
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_KEY }}
        run: npm ci && npm run refresh-crypto-cache
