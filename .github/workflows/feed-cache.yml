# CoinGecko·Yahoo·네이버 → Supabase `dopamine_feed_cache` (Vercel API는 읽기만).
# Secrets (repo 또는 Environment `production`): NEXT_PUBLIC_SUPABASE_URL,
#   SUPABASE_SERVICE_ROLE_KEY (또는 upsert 가능한 키를 NEXT_PUBLIC_SUPABASE_KEY 로)
name: Feed cache refresh

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install & refresh feed cache
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm ci && npm run refresh-feed-cache
