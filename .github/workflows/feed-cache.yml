# CoinGecko·Yahoo·네이버 → Supabase `dopamine_feed_cache` (Vercel API는 읽기만).
# 관심 자산 TOP50 → `dopamine_interest_asset_scores` (일별 score_history 병합).
# Secrets (repo 또는 Environment `production`): NEXT_PUBLIC_SUPABASE_URL,
#   NEXT_PUBLIC_SUPABASE_KEY (upsert 권한 필요)
# 관심 자산 DB 동기화: CRON_API_BASE_URL + CRON_SECRET (interest-assets?refresh=1 인증)
name: Feed cache refresh

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

defaults:
  run:
    working-directory: server

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install & refresh feed cache
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_KEY }}
          CRON_API_BASE_URL: ${{ secrets.CRON_API_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: npm ci && npm run refresh-feed-cache
