# CoinGecko·Yahoo·네이버 → Supabase `dopamine_feed_cache` (Vercel API는 읽기만).
# 관심 자산 DB는 `daily-event.yml` (POST /api/cron/interest-assets-daily) 에서 일 1회 갱신.
# Secrets: NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_KEY (upsert 권한 필요)
name: Feed cache refresh

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install & refresh feed cache
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_KEY }}
        run: npm ci && npm run refresh-feed-cache
