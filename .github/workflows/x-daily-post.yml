# X 일일 포스트 작업 (10:05 KST = 01:05 UTC)
# - X 포스트: POST /api/cron/x-daily-post
name: X daily post (10:05 KST)

on:
  workflow_dispatch: {}

jobs:
  post:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: X daily post
        env:
          CRON_API_BASE_URL: ${{ secrets.CRON_API_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_API_BASE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing CRON_API_BASE_URL or CRON_SECRET"
            exit 1
          fi
          BODY_FILE="$(mktemp)"
          STATUS_CODE=$(curl -sS -o "$BODY_FILE" -w "%{http_code}" -X POST "${CRON_API_BASE_URL}/api/cron/x-daily-post" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json")
          echo "x-daily-post http_status: ${STATUS_CODE}"
          echo "x-daily-post response_body:"
          cat "$BODY_FILE"
          echo
          if [ "${STATUS_CODE}" -lt 200 ] || [ "${STATUS_CODE}" -ge 300 ]; then
            echo "x-daily-post failed with status ${STATUS_CODE}"
            exit 1
          fi
