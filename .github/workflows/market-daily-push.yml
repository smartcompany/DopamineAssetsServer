# 한국 장 마감 후 시장 요약 푸시 (10:00 KST = 01:00 UTC)
# 이 파일만 보면 스케줄 실행 시 잡이 스킵되지 않음 (feed-cache.yml 시간별 실행과 분리).
name: Market daily push (10:00 KST)

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch: {}

jobs:
  market_daily_push:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Trigger /api/cron/market-daily-push
        env:
          CRON_API_BASE_URL: ${{ secrets.CRON_API_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_API_BASE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing CRON_API_BASE_URL or CRON_SECRET"
            exit 1
          fi
          curl -sS -X POST "${CRON_API_BASE_URL}/api/cron/market-daily-push" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            --fail
